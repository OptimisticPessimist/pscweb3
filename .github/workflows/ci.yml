name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  test_backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        
      - name: Install dependencies
        run: |
          cd backend
          uv sync --all-extras --dev
          
      - name: Run lint (Ruff)
        run: |
          cd backend
          uv run ruff check .
          
      - name: Run tests
        run: |
          cd backend
          uv run pytest
